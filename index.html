<!DOCTYPE html>
<html lang="de" class="light">
<head>
  <meta charset="UTF-8">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Segoe UI', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ===== Base ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,.3); border-radius: 3px; }

    /* ===== Transitions ===== */
    .task-enter { animation: taskSlideIn .35s cubic-bezier(.34,1.56,.64,1) forwards; }
    .task-exit { animation: taskSlideOut .3s cubic-bezier(.55,.06,.68,.19) forwards; }
    .task-check { animation: taskCheck .4s ease forwards; }
    .task-uncheck { animation: taskUncheck .3s ease forwards; }
    .task-highlight-in { animation: highlightPulse .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .task-move-up { animation: moveUp .4s cubic-bezier(.34,1.56,.64,1) forwards; }
    .fade-in { animation: fadeIn .3s ease forwards; }
    .fade-out { animation: fadeOut .25s ease forwards; }
    .scale-in { animation: scaleIn .3s cubic-bezier(.34,1.56,.64,1) forwards; }

    @keyframes taskSlideIn {
      from { opacity: 0; transform: translateY(-12px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes taskSlideOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to { opacity: 0; transform: translateX(60px) scale(.92); }
    }
    @keyframes taskCheck {
      0% { transform: scale(1); }
      30% { transform: scale(.97); }
      60% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }
    @keyframes taskUncheck {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes highlightPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251,146,60,.4); }
      50% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(251,146,60,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251,146,60,0); }
    }
    @keyframes moveUp {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes themeFade {
      0% { opacity: .7; filter: blur(2px); }
      100% { opacity: 1; filter: blur(0); }
    }
    .theme-transition { animation: themeFade .4s ease forwards; }

    /* ===== Checkbox Custom ===== */
    .custom-checkbox { position: relative; width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .custom-checkbox input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
    .custom-checkbox .checkmark {
      position: absolute; inset: 0; border-radius: 6px; border: 2px solid #d1d5db;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .custom-checkbox input:checked + .checkmark {
      background: #3b82f6; border-color: #3b82f6;
    }
    .custom-checkbox .checkmark::after {
      content: ''; position: absolute; display: none;
      left: 6px; top: 2px; width: 5px; height: 10px;
      border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .custom-checkbox input:checked + .checkmark::after { display: block; }

    /* ===== Drag Handle ===== */
    .drag-handle { cursor: grab; opacity: 0; transition: opacity .2s; }
    .task-item:hover .drag-handle { opacity: .5; }
    .drag-handle:hover { opacity: 1 !important; }
    .dragging { opacity: .5; transform: scale(.98); }
    .drag-over { border-top: 2px solid #3b82f6; }

    /* ===== Highlight Glow ===== */
    .highlighted { position: relative; }
    .highlighted::before {
      content: ''; position: absolute; inset: -2px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(251,146,60,.15), rgba(251,191,36,.1));
      z-index: -1; animation: highlightPulse 2s infinite;
    }

    /* ===== Priority Indicators ===== */
    .priority-bar { width: 3px; border-radius: 2px; min-height: 100%; flex-shrink: 0; }

    /* ===== Swipe (Mobile) ===== */
    .lists-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .list-panel { scroll-snap-align: start; }

    /* ===== Theme: Neon ===== */
    .theme-neon { background: #0a0a1a !important; color: #e0e0ff !important; }
    .theme-neon .list-panel { background: rgba(15,15,40,.9) !important; border: 1px solid rgba(100,100,255,.2) !important; }
    .theme-neon .task-item { background: rgba(20,20,50,.8) !important; border: 1px solid rgba(100,100,255,.15) !important; }
    .theme-neon .task-item:hover { border-color: rgba(100,100,255,.4) !important; box-shadow: 0 0 15px rgba(100,100,255,.1) !important; }
    .theme-neon .custom-checkbox .checkmark { border-color: rgba(100,100,255,.5); }
    .theme-neon .custom-checkbox input:checked + .checkmark { background: #6366f1; border-color: #6366f1; }
    .theme-neon .header-bar { background: rgba(10,10,30,.95) !important; border-bottom: 1px solid rgba(100,100,255,.2) !important; }
    .theme-neon .quick-add-input { background: rgba(20,20,50,.9) !important; border-color: rgba(100,100,255,.3) !important; color: #e0e0ff !important; }
    .theme-neon .quick-add-btn { background: #6366f1 !important; }
    .theme-neon .text-gray-500, .theme-neon .text-gray-400 { color: rgba(160,160,255,.6) !important; }
    .theme-neon .text-gray-800, .theme-neon .text-gray-900 { color: #e0e0ff !important; }
    .theme-neon .text-gray-600 { color: rgba(180,180,255,.7) !important; }
    .theme-neon .highlighted::before { background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.15)) !important; }
    .theme-neon .badge-timeframe { border-color: rgba(100,100,255,.3) !important; color: rgba(180,180,255,.8) !important; }
    .theme-neon .section-divider { border-color: rgba(100,100,255,.15) !important; }

    /* ===== Theme: Colorful ===== */
    .theme-colorful .list-panel:nth-child(1) { background: linear-gradient(135deg, #fef3c7, #fde68a) !important; }
    .theme-colorful .list-panel:nth-child(2) { background: linear-gradient(135deg, #dbeafe, #bfdbfe) !important; }
    .theme-colorful .list-panel:nth-child(3) { background: linear-gradient(135deg, #fce7f3, #fbcfe8) !important; }
    .theme-colorful .task-item { background: rgba(255,255,255,.85) !important; }
    .theme-colorful .custom-checkbox input:checked + .checkmark { background: #8b5cf6; border-color: #8b5cf6; }
    .theme-colorful .header-bar { background: linear-gradient(135deg, #f0abfc, #c084fc, #818cf8) !important; }
    .theme-colorful .header-bar * { color: white !important; }

    /* Dark mode overrides */
    .dark .list-panel { background: #1e1e2e; border-color: #2e2e3e; }
    .dark .task-item { background: #262637; border-color: #333348; }
    .dark .task-item:hover { background: #2d2d42; }
    .dark .header-bar { background: #16161e; border-color: #2e2e3e; }
    .dark .quick-add-input { background: #1e1e2e; border-color: #333348; color: #e4e4ef; }
    .dark .section-divider { border-color: #333348; }

    /* ===== Tooltip ===== */
    .tooltip { position: relative; }
    .tooltip::after {
      content: attr(data-tip); position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%) translateY(-4px); background: #1f2937; color: white;
      padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .tooltip:hover::after { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-[#0f0f17] text-gray-900 dark:text-gray-100 transition-colors duration-500">

          <button onclick="setTheme('colorful')" id="btn-colorful" class="theme-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 text-gray-500 dark:text-gray-400 hover:text-gray-700" data-theme="colorful">Colorful</button>
          <button onclick="setTheme('neon')" id="btn-neon" class="theme-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 text-gray-500 dark:text-gray-400 hover:text-gray-700" data-theme="neon">Neon</button>
        </div>

        <!-- Dark/Light Toggle -->
        <button onclick="toggleDarkMode()" id="dark-toggle" class="tooltip w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all duration-300" data-tip="Dark/Light Mode">

  <!-- ===== LISTS CONTAINER ===== -->

  <!-- ===== JAVASCRIPT ===== -->

            ]
          },

            ]
          },

          {

        ]
      },

        tasks: [
          {

            ]
          },

            subtasks: []
          },
          { id: 'a-div1', type: 'divider', label: 'Projekte' },
          {
            id: 'a3', text: 'TaskFuchs MVP planen', priority: 'high', timeframe: 'mittelfristig', highlighted: false, done: false,
            subtasks: [
              { id: 'a3a', text: 'Tech-Stack festlegen', done: true, subtasks: [] },
              { id: 'a3b', text: 'UI-Prototyp erstellen', done: false, subtasks: [] },
              { id: 'a3c', text: 'Supabase Projekt aufsetzen', done: false, subtasks: [] }
            ]
          },
          {
            id: 'a4', text: 'Code Review für PR #42', priority: 'normal', timeframe: 'mittelfristig', highlighted: false, done: false,
            subtasks: []
          },
          {
            id: 'a5', text: 'Dokumentation aktualisieren', priority: 'low', timeframe: 'langfristig', highlighted: false, done: false,
            subtasks: []
          }
        ]
      }
    ];

    // =============================================
    // STATE
    // =============================================
    let currentTheme = 'minimal';
    let isDark = false;
    let draggedTask = null;

    // =============================================
    // THEME MANAGEMENT
    // =============================================
    function toggleDarkMode() {
      isDark = !isDark;
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('dark-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('dark-icon').style.transform = 'rotate(360deg)';
      setTimeout(() => document.getElementById('dark-icon').style.transform = '', 500);
      applyThemeTransition();
    }

    function setTheme(theme) {
      currentTheme = theme;
      document.body.classList.remove('theme-neon', 'theme-colorful');
      if (theme === 'neon') {
        isDark = true;
        document.documentElement.classList.add('dark');
        document.getElementById('dark-icon').textContent = '☀️';
        document.body.classList.add('theme-neon');
      } else if (theme === 'colorful') {
        document.body.classList.add('theme-colorful');
      }

      // Update button states
      document.querySelectorAll('.theme-btn').forEach(btn => {
        if (btn.dataset.theme === theme) {
          btn.classList.add('bg-white', 'dark:bg-gray-700', 'shadow-sm', 'text-gray-900', 'dark:text-gray-100');
          btn.classList.remove('text-gray-500', 'dark:text-gray-400');
        } else {
          btn.classList.remove('bg-white', 'dark:bg-gray-700', 'shadow-sm', 'text-gray-900', 'dark:text-gray-100');
          btn.classList.add('text-gray-500', 'dark:text-gray-400');
        }
      });

      applyThemeTransition();
    }

    function applyThemeTransition() {
      document.body.classList.add('theme-transition');
      setTimeout(() => document.body.classList.remove('theme-transition'), 400);
    }

    // =============================================
    // PRIORITY HELPERS
    // =============================================
    const priorityConfig = {
      low:    { color: '#9ca3af', bg: 'bg-gray-100 dark:bg-gray-800', text: 'text-gray-500', label: 'Niedrig', bar: '#d1d5db' },
      normal: { color: '#3b82f6', bg: 'bg-blue-50 dark:bg-blue-900/20', text: 'text-blue-500', label: 'Normal', bar: '#60a5fa' },
      high:   { color: '#f97316', bg: 'bg-orange-50 dark:bg-orange-900/20', text: 'text-orange-500', label: 'Hoch', bar: '#fb923c' },
      asap:   { color: '#ef4444', bg: 'bg-red-50 dark:bg-red-900/20', text: 'text-red-500', label: 'ASAP!', bar: '#f87171' }
    };

    const timeframeConfig = {
      akut:          { label: 'Akut', class: 'text-red-600 dark:text-red-400 border-red-200 dark:border-red-800' },
      mittelfristig: { label: 'Mittelfristig', class: 'text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-800' },
      langfristig:   { label: 'Langfristig', class: 'text-green-600 dark:text-green-400 border-green-200 dark:border-green-800' }
    };

    // =============================================
    // RENDER
    // =============================================
    function render() {
      const container = document.getElementById('lists-container');
      container.innerHTML = '';

      listsData.forEach(list => {
        const activeTasks = list.tasks.filter(t => t.type === 'divider' || !t.done);
        const doneTasks = list.tasks.filter(t => t.type !== 'divider' && t.done);

        // Sort: highlighted first
        const sorted = [...activeTasks].sort((a, b) => {
          if (a.type === 'divider' || b.type === 'divider') return 0;
          if (a.highlighted && !b.highlighted) return -1;
          if (!a.highlighted && b.highlighted) return 1;
          return 0;
        });

        const panel = document.createElement('div');
        panel.className = 'list-panel min-w-[320px] md:min-w-0 w-full rounded-2xl bg-white dark:bg-[#1e1e2e] border border-gray-200/60 dark:border-gray-800/60 shadow-sm flex flex-col transition-all duration-500';
        panel.innerHTML = `
          <!-- List Header -->
          <div class="px-5 pt-5 pb-3 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <span class="text-xl">${list.icon}</span>
              <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 tracking-tight">${list.title}</h2>
              <span class="text-xs font-medium text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-full">${activeTasks.filter(t => t.type !== 'divider').length}</span>
            </div>
          </div>

          <!-- Tasks -->
          <div class="flex-1 px-3 pb-2 space-y-1 overflow-y-auto max-h-[60vh]" id="task-list-${list.id}">
            ${sorted.map(task => task.type === 'divider' ? renderDivider(task) : renderTask(task, 0, list.id)).join('')}
          </div>

          <!-- Done Section -->
          ${doneTasks.length > 0 ? `
          <div class="px-3 pb-2">
            <button onclick="toggleDoneSection('${list.id}')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50">
              <svg class="w-4 h-4 transition-transform duration-300" id="done-chevron-${list.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
              <span>Erledigt (${doneTasks.length})</span>
            </button>
            <div id="done-section-${list.id}" class="hidden space-y-1 mt-1">
              ${doneTasks.map(t => renderDoneTask(t, list.id)).join('')}
            </div>
          </div>` : ''}

          <!-- Quick Add -->
          <div class="p-3 border-t border-gray-100 dark:border-gray-800/60">
            <div class="flex gap-2">
              <input type="text" placeholder="Neue Aufgabe..." id="input-${list.id}"
                class="quick-add-input flex-1 px-4 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 focus:outline-none focus:ring-2 focus:ring-orange-400/40 focus:border-orange-400 dark:text-gray-200 placeholder-gray-400 transition-all duration-300"
                onkeydown="if(event.key==='Enter')addTask('${list.id}')">
              <button onclick="addTask('${list.id}')" class="quick-add-btn px-4 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white text-sm font-medium rounded-xl hover:shadow-lg hover:shadow-orange-500/25 active:scale-95 transition-all duration-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
              </button>
            </div>
          </div>

        container.appendChild(panel);

    function renderDivider(task) {
      return `
        <div class="section-divider flex items-center gap-3 px-2 py-3">
          <div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">${task.label}</span>
          <div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
        </div>`;
    }

    function renderTask(task, depth, listId) {
      const p = priorityConfig[task.priority] || priorityConfig.normal;
      const tf = task.timeframe ? timeframeConfig[task.timeframe] : null;
      const hasSubtasks = task.subtasks && task.subtasks.length > 0;
      const doneSubtasks = hasSubtasks ? task.subtasks.filter(s => s.done).length : 0;
      const indent = depth * 24;

      return `
        <div class="task-item group rounded-xl px-3 py-2.5 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-all duration-200 ${task.highlighted ? 'highlighted' : ''}"
             style="margin-left: ${indent}px"
             draggable="${depth === 0}"
             ondragstart="onDragStart(event, '${task.id}', '${listId}')"
             ondragover="onDragOver(event)"
             ondrop="onDrop(event, '${task.id}', '${listId}')"
             ondragend="onDragEnd(event)"
             id="task-${task.id}">
          <div class="flex items-start gap-2.5">
            <!-- Priority Bar -->
            <div class="priority-bar mt-1" style="background: ${p.bar}"></div>

            <!-- Drag Handle -->
            ${depth === 0 ? `<div class="drag-handle mt-1 text-gray-300 dark:text-gray-600">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
            </div>` : '<div style="width:16px"></div>'}

            <!-- Checkbox -->
            <label class="custom-checkbox mt-0.5">
              <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}', '${listId}')">
              <span class="checkmark"></span>
            </label>

            <!-- Content -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-sm font-medium text-gray-800 dark:text-gray-100 ${task.done ? 'line-through opacity-50' : ''} transition-all duration-300">${task.text}</span>
                ${task.priority === 'asap' ? '<span class="text-[10px] font-bold px-1.5 py-0.5 rounded-md bg-red-500 text-white animate-pulse">ASAP!</span>' : ''}
              </div>
              <div class="flex items-center gap-2 mt-1 flex-wrap">
                ${tf ? `<span class="badge-timeframe text-[10px] font-medium px-2 py-0.5 rounded-full border ${tf.class}">${tf.label}</span>` : ''}
                ${hasSubtasks ? `<span class="text-[10px] text-gray-400 dark:text-gray-500">${doneSubtasks}/${task.subtasks.length} erledigt</span>` : ''}
              </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
              <!-- Highlight -->
              <button onclick="toggleHighlight('${task.id}', '${listId}')" class="tooltip w-7 h-7 flex items-center justify-center rounded-lg hover:bg-orange-50 dark:hover:bg-orange-900/20 transition-all duration-200 ${task.highlighted ? 'bg-orange-50 dark:bg-orange-900/30' : ''}" data-tip="Highlight">
                <svg class="w-3.5 h-3.5 ${task.highlighted ? 'text-orange-500' : 'text-gray-400'} transition-colors" fill="${task.highlighted ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                </svg>
              </button>
              <!-- Delete -->
              <button onclick="deleteTask('${task.id}', '${listId}')" class="tooltip w-7 h-7 flex items-center justify-center rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all duration-200" data-tip="Löschen">
                <svg class="w-3.5 h-3.5 text-gray-400 hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Subtasks -->
          ${hasSubtasks ? `
            <div class="mt-1">
              <button onclick="toggleSubtasks('${task.id}')" class="flex items-center gap-1 text-[11px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 ml-10 mb-1 transition-colors">
                <svg class="w-3 h-3 transition-transform duration-300" id="subtask-chevron-${task.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transform: rotate(90deg)">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                Unteraufgaben
              </button>
              <div id="subtasks-${task.id}" class="space-y-0.5">
                ${task.subtasks.map(st => renderSubtask(st, depth + 1, listId, task.id)).join('')}
              </div>
            </div>
          ` : ''}
        </div>`;
    }

    function renderSubtask(st, depth, listId, parentId) {
      const indent = depth * 24;
      const hasSubtasks = st.subtasks && st.subtasks.length > 0;
      return `
        <div class="flex items-center gap-2.5 px-3 py-1.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/30 transition-all duration-200" style="margin-left: ${indent}px">
          <label class="custom-checkbox" style="width:16px;height:16px">
            <input type="checkbox" ${st.done ? 'checked' : ''} onchange="toggleSubtask('${st.id}', '${listId}')">
            <span class="checkmark" style="border-radius:4px; border-width:1.5px"></span>
          </label>
          <span class="text-xs text-gray-600 dark:text-gray-400 ${st.done ? 'line-through opacity-40' : ''} transition-all duration-300">${st.text}</span>
        </div>
        ${hasSubtasks ? st.subtasks.map(s => renderSubtask(s, depth + 1, listId, st.id)).join('') : ''}
      `;
    }

    function renderDoneTask(task, listId) {
      return `
        <div class="flex items-center gap-2.5 px-3 py-2 rounded-xl opacity-50 hover:opacity-70 transition-all duration-200">
          <label class="custom-checkbox" style="width:16px;height:16px">
            <input type="checkbox" checked onchange="undoTask('${task.id}', '${listId}')">
            <span class="checkmark" style="border-radius:4px"></span>
          </label>
          <span class="text-xs text-gray-500 line-through">${task.text}</span>
          <button onclick="undoTask('${task.id}', '${listId}')" class="ml-auto text-[10px] text-orange-400 hover:text-orange-500 font-medium transition-colors">Undo</button>
        </div>`;
    }

    // =============================================
    // TASK ACTIONS
    // =============================================
    function findTaskRecursive(tasks, id) {
      for (const t of tasks) {
        if (t.id === id) return t;
        if (t.subtasks) {
          const found = findTaskRecursive(t.subtasks, id);
          if (found) return found;
        }
      }
      return null;
    }

    function findList(listId) {
      return listsData.find(l => l.id === listId);
    }

    function toggleTask(taskId, listId) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (!task) return;

      task.done = !task.done;

      // Propagate to all subtasks
      function setAllDone(t, done) {
        t.done = done;
        if (t.subtasks) t.subtasks.forEach(s => setAllDone(s, done));
      }
      if (task.subtasks) task.subtasks.forEach(s => setAllDone(s, task.done));

      // Animate
      const el = document.getElementById(`task-${taskId}`);
      if (el) {
        if (task.done) {
          el.classList.add('task-exit');
          setTimeout(() => render(), 300);
        } else {
          render();
        }
      } else {
        render();
      }
    }

    function toggleSubtask(subtaskId, listId) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, subtaskId);
      if (task) {
        task.done = !task.done;
        // Also set child subtasks
        function setAllDone(t, done) {
          t.done = done;
          if (t.subtasks) t.subtasks.forEach(s => setAllDone(s, done));
        }
        if (task.subtasks) task.subtasks.forEach(s => setAllDone(s, task.done));
        render();
      }
    }

    function undoTask(taskId, listId) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (task) {
        task.done = false;
        if (task.subtasks) task.subtasks.forEach(s => { s.done = false; });
        render();
      }
    }

    function toggleHighlight(taskId, listId) {
      const list = findList(listId);
      const task = list.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.highlighted = !task.highlighted;

      render();

      // Animate highlight
      setTimeout(() => {
        const el = document.getElementById(`task-${taskId}`);
        if (el && task.highlighted) {
          el.classList.add('task-highlight-in');
          setTimeout(() => el.classList.remove('task-highlight-in'), 500);
        }
      }, 50);
    }

    function deleteTask(taskId, listId) {
      const list = findList(listId);
      const el = document.getElementById(`task-${taskId}`);
      if (el) {
        el.classList.add('task-exit');
        setTimeout(() => {
          list.tasks = list.tasks.filter(t => t.id !== taskId);
          render();
        }, 300);
      }
    }

    function addTask(listId) {
      const input = document.getElementById(`input-${listId}`);
      const text = input.value.trim();
      if (!text) return;

      const list = findList(listId);
      const newTask = {
        id: 'task-' + Date.now(),
        text: text,
        priority: 'normal',
        timeframe: null,
        highlighted: false,
        done: false,
        subtasks: []
      };
      list.tasks.push(newTask);
      input.value = '';
      render();

      // Animate new task
      setTimeout(() => {
        const el = document.getElementById(`task-${newTask.id}`);
        if (el) {
          el.classList.add('task-enter');
          setTimeout(() => el.classList.remove('task-enter'), 350);
        }
      }, 20);
    }

    function toggleSubtasks(taskId) {
      const el = document.getElementById(`subtasks-${taskId}`);
      const chevron = document.getElementById(`subtask-chevron-${taskId}`);
      if (!el) return;

      if (el.style.display === 'none') {
        el.style.display = '';
        chevron.style.transform = 'rotate(90deg)';
      } else {
        el.style.display = 'none';
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    function toggleDoneSection(listId) {
      const el = document.getElementById(`done-section-${listId}`);
      const chevron = document.getElementById(`done-chevron-${listId}`);
      if (!el) return;

      if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');
        el.classList.add('fade-in');
        chevron.style.transform = 'rotate(90deg)';
      } else {
        el.classList.add('hidden');
        el.classList.remove('fade-in');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    // =============================================
    // DRAG & DROP
    // =============================================
    function onDragStart(e, taskId, listId) {
      draggedTask = { taskId, listId };
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const taskItem = e.target.closest('.task-item');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (taskItem) taskItem.classList.add('drag-over');
    }

    function onDrop(e, targetId, targetListId) {
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (!draggedTask || draggedTask.taskId === targetId) return;

      const sourceList = findList(draggedTask.listId);
      const targetList = findList(targetListId);
      const sourceIdx = sourceList.tasks.findIndex(t => t.id === draggedTask.taskId);
      const targetIdx = targetList.tasks.findIndex(t => t.id === targetId);

      if (sourceIdx === -1 || targetIdx === -1) return;

      const [task] = sourceList.tasks.splice(sourceIdx, 1);
      targetList.tasks.splice(targetIdx, 0, task);

      draggedTask = null;
      render();
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      draggedTask = null;
    }

    // =============================================
    // INIT
    // =============================================
    render();
  </script>
</body>
</html>

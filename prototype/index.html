<!DOCTYPE html>
<html lang="de" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFuchs 🦊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Segoe UI', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ===== Base ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,.3); border-radius: 3px; }

    /* ===== Transitions ===== */
    .task-enter { animation: taskSlideIn .35s cubic-bezier(.34,1.56,.64,1) forwards; }
    .task-exit { animation: taskSlideOut .3s cubic-bezier(.55,.06,.68,.19) forwards; }
    .task-check { animation: taskCheck .4s ease forwards; }
    .task-uncheck { animation: taskUncheck .3s ease forwards; }
    .task-highlight-in { animation: highlightPulse .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .task-move-up { animation: moveUp .4s cubic-bezier(.34,1.56,.64,1) forwards; }
    .fade-in { animation: fadeIn .3s ease forwards; }
    .fade-out { animation: fadeOut .25s ease forwards; }
    .scale-in { animation: scaleIn .3s cubic-bezier(.34,1.56,.64,1) forwards; }

    @keyframes taskSlideIn {
      from { opacity: 0; transform: translateY(-12px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes taskSlideOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to { opacity: 0; transform: translateX(60px) scale(.92); }
    }
    @keyframes taskCheck {
      0% { transform: scale(1); }
      30% { transform: scale(.97); }
      60% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }
    @keyframes taskUncheck {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes highlightPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251,146,60,.4); }
      50% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(251,146,60,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251,146,60,0); }
    }
    @keyframes moveUp {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes themeFade {
      0% { opacity: .7; filter: blur(2px); }
      100% { opacity: 1; filter: blur(0); }
    }
    .theme-transition { animation: themeFade .4s ease forwards; }
    @keyframes slideInRight {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    @keyframes contextMenuIn {
      from { opacity: 0; transform: scale(.92) translateY(-4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes pinCardIn {
      from { opacity: 0; transform: scale(.9) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes notePopIn {
      from { opacity: 0; transform: translateY(4px) scale(.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== Checkbox Custom ===== */
    .custom-checkbox { position: relative; width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .custom-checkbox input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
    .custom-checkbox .checkmark {
      position: absolute; inset: 0; border-radius: 6px; border: 2px solid #d1d5db;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .custom-checkbox input:checked + .checkmark {
      background: #3b82f6; border-color: #3b82f6;
    }
    .custom-checkbox .checkmark::after {
      content: ''; position: absolute; display: none;
      left: 6px; top: 2px; width: 5px; height: 10px;
      border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .custom-checkbox input:checked + .checkmark::after { display: block; }

    /* ===== Drag Handle ===== */
    .drag-handle { cursor: grab; opacity: 0; transition: opacity .2s; }
    .task-item:hover .drag-handle { opacity: .5; }
    .drag-handle:hover { opacity: 1 !important; }
    .dragging { opacity: .5; transform: scale(.98); }
    .drag-over { border-top: 2px solid #3b82f6; }

    /* ===== ASAP Blink (all themes) ===== */
    .asap-blink {
      animation: asapPulse 2.5s ease-in-out infinite;
    }
    @keyframes asapPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
      50% { box-shadow: 0 0 12px 2px rgba(239,68,68,.25); }
    }

    /* ===== Highlight Glow ===== */
    .highlighted { position: relative; }
    .highlighted::before {
      content: ''; position: absolute; inset: -2px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(251,146,60,.15), rgba(251,191,36,.1));
      z-index: -1; animation: highlightPulse 2s infinite;
    }

    /* ===== Priority Indicators ===== */
    .priority-bar { width: 3px; border-radius: 2px; min-height: 100%; flex-shrink: 0; }

    /* ===== Swipe (Mobile) ===== */
    .lists-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .list-panel { scroll-snap-align: start; }

    /* ===== Sidebar ===== */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 60;
      width: 280px; transform: translateX(-100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
      position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,.4);
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: all; }
    @media (min-width: 768px) {
      .sidebar-overlay.active { opacity: 0; pointer-events: none; }
      .main-content { transition: margin-left .35s cubic-bezier(.4,0,.2,1); }
      .main-content.shifted { margin-left: 280px; }
    }

    /* ===== Context Menu ===== */
    .context-menu {
      position: fixed; z-index: 100; min-width: 220px;
      border-radius: 12px; padding: 6px;
      animation: contextMenuIn .2s cubic-bezier(.34,1.56,.64,1) forwards;
      box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 4px 16px rgba(0,0,0,.1);
    }
    .context-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
      transition: background .15s;
    }
    .context-menu-item:hover { background: rgba(0,0,0,.05); }
    .dark .context-menu-item:hover { background: rgba(255,255,255,.08); }
    .context-menu-divider { height: 1px; margin: 4px 8px; }
    .context-submenu {
      position: absolute; left: 100%; top: 0; min-width: 180px;
      border-radius: 12px; padding: 6px;
      animation: contextMenuIn .15s ease forwards;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }

    /* ===== Pinboard ===== */
    .pinboard { transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s, padding .3s; overflow: hidden; }
    .pinboard.collapsed { max-height: 0 !important; opacity: 0; padding-top: 0 !important; padding-bottom: 0 !important; }
    .pin-card { animation: pinCardIn .3s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ===== Note Popover ===== */
    .note-popover {
      position: absolute; z-index: 80; min-width: 200px; max-width: 280px;
      border-radius: 12px; padding: 12px 14px;
      animation: notePopIn .25s cubic-bezier(.34,1.56,.64,1) forwards;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }
    .note-icon { opacity: 0; transition: opacity .2s; }
    .task-item:hover .note-icon { opacity: 1; }

    /* ===== Avatar ===== */
    .avatar-stack { display: flex; }
    .avatar-stack .avatar { margin-left: -6px; border: 2px solid white; }
    .avatar-stack .avatar:first-child { margin-left: 0; }
    .dark .avatar-stack .avatar { border-color: #1e1e2e; }

    /* ===== Progress Bar ===== */
    .progress-bar { display: flex; gap: 2px; height: 4px; width: 48px; cursor: pointer; flex-shrink: 0; }
    .progress-segment { flex: 1; border-radius: 2px; background: #e5e7eb; transition: background .3s; }
    .dark .progress-segment { background: #374151; }
    .progress-segment.active-0 { background: #9ca3af; }
    .progress-segment.active-1 { background: #3b82f6; }
    .progress-segment.active-2 { background: #f59e0b; }
    .progress-segment.active-3 { background: #22c55e; }

    /* ===== Column Resize Handle ===== */
    .col-resize-handle {
      width: 8px; cursor: col-resize; position: relative; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .col-resize-handle::after {
      content: ''; width: 3px; height: 32px; border-radius: 2px;
      background: transparent; transition: background .2s;
    }
    .col-resize-handle:hover::after { background: rgba(128,128,128,.4); }
    .col-resize-handle.dragging::after { background: #f97316; }

    /* ===== Theme: Neon ===== */
    .theme-neon { background: #0a0a1a !important; color: #e0e0ff !important; }
    .theme-neon .list-panel { background: rgba(15,15,40,.9) !important; border: 1px solid rgba(100,100,255,.2) !important; }
    .theme-neon .task-item { background: rgba(20,20,50,.8) !important; border: 1px solid rgba(100,100,255,.15) !important; }
    .theme-neon .task-item:hover { border-color: rgba(100,100,255,.4) !important; box-shadow: 0 0 15px rgba(100,100,255,.1) !important; }
    .theme-neon .custom-checkbox .checkmark { border-color: rgba(100,100,255,.5); }
    .theme-neon .custom-checkbox input:checked + .checkmark { background: #6366f1; border-color: #6366f1; }
    .theme-neon .header-bar { background: rgba(10,10,30,.95) !important; border-bottom: 1px solid rgba(100,100,255,.2) !important; }
    .theme-neon .quick-add-input { background: rgba(20,20,50,.9) !important; border-color: rgba(100,100,255,.3) !important; color: #e0e0ff !important; }
    .theme-neon .quick-add-btn { background: #6366f1 !important; }
    .theme-neon .text-gray-500, .theme-neon .text-gray-400 { color: rgba(160,160,255,.6) !important; }
    .theme-neon .text-gray-800, .theme-neon .text-gray-900 { color: #e0e0ff !important; }
    .theme-neon .text-gray-600 { color: rgba(180,180,255,.7) !important; }
    .theme-neon .highlighted::before { background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.15)) !important; }
    .theme-neon .badge-timeframe { border-color: rgba(100,100,255,.3) !important; color: rgba(180,180,255,.8) !important; }
    .theme-neon .section-divider { border-color: rgba(100,100,255,.15) !important; }
    .theme-neon .sidebar { background: rgba(10,10,30,.98) !important; border-right: 1px solid rgba(100,100,255,.2) !important; }
    .theme-neon .context-menu { background: rgba(15,15,40,.98) !important; border: 1px solid rgba(100,100,255,.25) !important; }
    .theme-neon .context-submenu { background: rgba(15,15,40,.98) !important; border: 1px solid rgba(100,100,255,.25) !important; }
    .theme-neon .note-popover { background: rgba(15,15,40,.98) !important; border: 1px solid rgba(100,100,255,.25) !important; }
    .theme-neon .pinboard-area { background: rgba(15,15,40,.6) !important; border: 1px solid rgba(100,100,255,.15) !important; }
    .theme-neon .pin-card { background: rgba(20,20,50,.9) !important; border: 1px solid rgba(100,100,255,.2) !important; }

    /* ===== Theme: Colorful — Light ===== */
    .theme-colorful { background: linear-gradient(160deg, #fef7f0 0%, #f0f4ff 40%, #fdf2f8 100%) !important; }
    .theme-colorful .list-panel:nth-child(1) { background: linear-gradient(145deg, #fff5f0, #fce7d6) !important; border-color: #fdba74 !important; }
    .theme-colorful .list-panel:nth-child(3) { background: linear-gradient(145deg, #eef4ff, #d4e4ff) !important; border-color: #93c5fd !important; }
    .theme-colorful .list-panel:nth-child(5) { background: linear-gradient(145deg, #fdf2f8, #fce7f3) !important; border-color: #f9a8d4 !important; }
    .theme-colorful .list-panel:nth-child(7) { background: linear-gradient(145deg, #f0fdf4, #dcfce7) !important; border-color: #86efac !important; }
    .theme-colorful .list-panel:nth-child(9) { background: linear-gradient(145deg, #f5f3ff, #ede9fe) !important; border-color: #c4b5fd !important; }
    .theme-colorful .task-item { background: rgba(255,255,255,.88) !important; border: 1px solid rgba(0,0,0,.06) !important; }
    .theme-colorful .task-item:hover { background: rgba(255,255,255,.96) !important; box-shadow: 0 2px 8px rgba(0,0,0,.06) !important; }
    .theme-colorful .custom-checkbox input:checked + .checkmark { background: #8b5cf6; border-color: #8b5cf6; }
    .theme-colorful .header-bar { background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6) !important; border-bottom: none !important; }
    .theme-colorful .header-bar * { color: white !important; }
    .theme-colorful .header-bar .theme-btn { color: rgba(255,255,255,.7) !important; }
    .theme-colorful .header-bar .theme-btn.bg-white { color: #7c3aed !important; background: white !important; }
    .theme-colorful .list-panel h2 { color: #1e293b !important; }
    .theme-colorful .task-item .task-text { color: #111827 !important; }
    .theme-colorful .task-item .badge-priority { color: #fff !important; }
    .theme-colorful .task-item .badge-timeframe { background: rgba(255,255,255,.8) !important; color: #374151 !important; border-color: rgba(0,0,0,.1) !important; }
    .theme-colorful .task-item .task-meta,
    .theme-colorful .task-item .task-date,
    .theme-colorful .task-item .subtask-info { color: #6b7280 !important; }
    .theme-colorful .subtask-item .text-xs { color: #374151 !important; }
    .theme-colorful .section-divider span { color: #374151 !important; }
    .theme-colorful .section-divider .divider-line { background: rgba(0,0,0,.1) !important; }
    .theme-colorful .list-panel .list-count { color: #374151 !important; background: rgba(255,255,255,.6) !important; }
    .theme-colorful .quick-add-input { background: rgba(255,255,255,.8) !important; border-color: rgba(0,0,0,.08) !important; color: #1f2937 !important; }
    .theme-colorful .quick-add-input::placeholder { color: #9ca3af !important; }
    .theme-colorful .quick-add-btn { background: linear-gradient(135deg, #8b5cf6, #ec4899) !important; }
    .theme-colorful .sidebar { background: linear-gradient(180deg, #fff5f0, #eef4ff, #fdf2f8) !important; }
    .theme-colorful .sidebar * { color: #1e293b !important; }
    .theme-colorful .context-menu { background: rgba(255,255,255,.98) !important; border: 1px solid rgba(0,0,0,.08) !important; }
    .theme-colorful .context-menu * { color: #1e293b !important; }
    .theme-colorful .note-popover { background: rgba(255,255,255,.98) !important; border: 1px solid rgba(0,0,0,.08) !important; }
    .theme-colorful .pinboard-area { background: linear-gradient(135deg, rgba(249,115,22,.05), rgba(139,92,246,.05)) !important; border-color: rgba(0,0,0,.06) !important; }
    .theme-colorful .pin-card { background: rgba(255,255,255,.92) !important; border-color: rgba(0,0,0,.06) !important; }
    .theme-colorful .pin-card * { color: #1e293b !important; }
    .theme-colorful .done-toggle-btn { color: #6b7280 !important; }
    .theme-colorful .collapse-all-btn { color: #6b7280 !important; }
    .theme-colorful .drag-handle { color: #9ca3af !important; }
    .theme-colorful .subtask-drag-handle { color: #9ca3af !important; }
    .theme-colorful .progress-segment { background: rgba(0,0,0,.08) !important; }
    .theme-colorful .progress-segment.active-0 { background: #9ca3af !important; }
    .theme-colorful .progress-segment.active-1 { background: #3b82f6 !important; }
    .theme-colorful .progress-segment.active-2 { background: #f59e0b !important; }
    .theme-colorful .progress-segment.active-3 { background: #22c55e !important; }

    /* ===== Theme: Colorful — Dark ===== */
    .dark.theme-colorful { background: #0d0b0f !important; }
    .dark.theme-colorful .list-panel:nth-child(1) { background: linear-gradient(145deg, #1f1410, #2a1b14) !important; border-color: #5c3520 !important; }
    .dark.theme-colorful .list-panel:nth-child(3) { background: linear-gradient(145deg, #0f1520, #141d2e) !important; border-color: #1e3a5f !important; }
    .dark.theme-colorful .list-panel:nth-child(5) { background: linear-gradient(145deg, #1f1018, #2a1520) !important; border-color: #5f1e3a !important; }
    .dark.theme-colorful .list-panel:nth-child(7) { background: linear-gradient(145deg, #101f14, #152a1b) !important; border-color: #1e5f35 !important; }
    .dark.theme-colorful .list-panel:nth-child(9) { background: linear-gradient(145deg, #16102a, #1e1538) !important; border-color: #3a1e5f !important; }
    .dark.theme-colorful .task-item { background: rgba(255,255,255,.06) !important; border: 1px solid rgba(255,255,255,.08) !important; }
    .dark.theme-colorful .task-item:hover { background: rgba(255,255,255,.1) !important; }
    .dark.theme-colorful .header-bar { background: linear-gradient(135deg, #c2410c, #be185d, #6d28d9) !important; border-bottom: none !important; }
    .dark.theme-colorful .list-panel h2 { color: #f1f5f9 !important; }
    .dark.theme-colorful .task-item .task-text { color: #f3f4f6 !important; }
    .dark.theme-colorful .task-item .badge-timeframe { background: rgba(255,255,255,.1) !important; color: #e2e8f0 !important; border-color: rgba(255,255,255,.12) !important; }
    .dark.theme-colorful .task-item .task-meta,
    .dark.theme-colorful .task-item .task-date,
    .dark.theme-colorful .task-item .subtask-info { color: #94a3b8 !important; }
    .dark.theme-colorful .subtask-item .text-xs { color: #cbd5e1 !important; }
    .dark.theme-colorful .section-divider span { color: #cbd5e1 !important; }
    .dark.theme-colorful .section-divider .divider-line { background: rgba(255,255,255,.1) !important; }
    .dark.theme-colorful .list-panel .list-count { color: #e2e8f0 !important; background: rgba(255,255,255,.1) !important; }
    .dark.theme-colorful .quick-add-input { background: rgba(0,0,0,.3) !important; border-color: rgba(255,255,255,.1) !important; color: #f3f4f6 !important; }
    .dark.theme-colorful .quick-add-btn { background: linear-gradient(135deg, #6d28d9, #be185d) !important; }
    .dark.theme-colorful .sidebar { background: linear-gradient(180deg, #1f1410, #0f1520, #1f1018) !important; }
    .dark.theme-colorful .sidebar * { color: #f1f5f9 !important; }
    .dark.theme-colorful .context-menu { background: rgba(20,15,25,.98) !important; border: 1px solid rgba(255,255,255,.1) !important; }
    .dark.theme-colorful .context-menu * { color: #f1f5f9 !important; }
    .dark.theme-colorful .note-popover { background: rgba(20,15,25,.98) !important; border: 1px solid rgba(255,255,255,.1) !important; }
    .dark.theme-colorful .pinboard-area { background: rgba(15,10,20,.6) !important; border-color: rgba(255,255,255,.06) !important; }
    .dark.theme-colorful .pin-card { background: rgba(255,255,255,.06) !important; border-color: rgba(255,255,255,.08) !important; }
    .dark.theme-colorful .pin-card * { color: #f1f5f9 !important; }
    .dark.theme-colorful .done-toggle-btn { color: #94a3b8 !important; }
    .dark.theme-colorful .collapse-all-btn { color: #94a3b8 !important; }
    .dark.theme-colorful .drag-handle { color: #4a5568 !important; }
    .dark.theme-colorful .subtask-drag-handle { color: #4a5568 !important; }
    .dark.theme-colorful .progress-segment { background: rgba(255,255,255,.08) !important; }

    /* Dark mode overrides */
    .dark .list-panel { background: #1e1e2e; border-color: #2e2e3e; }
    .dark .task-item { background: #262637; border-color: #333348; }
    .dark .task-item:hover { background: #2d2d42; }
    .dark .header-bar { background: #16161e; border-color: #2e2e3e; }
    .dark .quick-add-input { background: #1e1e2e; border-color: #333348; color: #e4e4ef; }
    .dark .section-divider { border-color: #333348; }
    .dark .sidebar { background: #16161e; border-color: #2e2e3e; }
    .dark .context-menu { background: #1e1e2e; border: 1px solid #333348; }
    .dark .context-submenu { background: #1e1e2e; border: 1px solid #333348; }
    .dark .context-menu-divider { background: #333348; }
    .dark .note-popover { background: #1e1e2e; border: 1px solid #333348; }
    .dark .pinboard-area { background: #1a1a2a; border-color: #2e2e3e; }
    .dark .pin-card { background: #262637; border-color: #333348; }

    /* ===== Tooltip ===== */
    .tooltip { position: relative; }
    .tooltip::after {
      content: attr(data-tip); position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%) translateY(-4px); background: #1f2937; color: white;
      padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .tooltip:hover::after { opacity: 1; }

    /* ===== Inline Edit ===== */
    .inline-edit-title {
      background: transparent; border: none; outline: none; font-size: inherit;
      font-weight: inherit; color: inherit; width: 100%; padding: 2px 4px;
      border-radius: 6px;
    }
    .inline-edit-title:focus {
      background: rgba(0,0,0,.05); box-shadow: 0 0 0 2px rgba(251,146,60,.4);
    }

      display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px;
      animation: contextMenuIn .2s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .dark .emoji-picker { background: #1e1e2e; border: 1px solid #333348; }

    .task-row { display: flex; align-items: center; gap: 8px; min-height: 28px; }

    .task-badges { display: flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
    .task-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    .inline-edit-task {
      background: transparent; border: none; outline: none; font-size: inherit;
      font-weight: inherit; color: inherit; width: 100%; padding: 1px 4px;

    .subtask-drag-handle { cursor: grab; opacity: 0; transition: opacity .2s; flex-shrink: 0; }
    .subtask-item:hover .subtask-drag-handle { opacity: .4; }
    .subtask-drag-handle:hover { opacity: .8 !important; }

    /* ===== Focus Overlay ===== */
    .focus-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .25s ease forwards;
    }
    .focus-overlay.hidden { display: none; }
    .dark .focus-overlay { background: rgba(0,0,0,.7); }
    .focus-card {

      animation: scaleIn .3s cubic-bezier(.34,1.56,.64,1) forwards;

    .list-drag-handle { cursor: grab; opacity: .25; transition: opacity .2s; }

    /* ===== Clickable Badges ===== */
    .badge-clickable { cursor: pointer; transition: transform .15s, box-shadow .15s; }

      if (task.type === 'divider') return true;
      if (!activeFilters[task.priority]) return false;
      if (task.timeframe && !timeframeFilters[task.timeframe]) return false;
      if (viewFilters.highlighted && !task.highlighted) return false;
      if (viewFilters.withDate && !task.dueDate) return false;
      if (viewFilters.shared && !list.shared) return false;
      return true;
    }

    function setTheme(theme) {
      currentTheme = theme;
      document.body.classList.remove('theme-neon', 'theme-colorful', 'theme-aurora');
      if (theme === 'neon') { isDark = true; document.documentElement.classList.add('dark'); document.getElementById('dark-icon').textContent = '☀️'; document.body.classList.add('theme-neon'); }
      else if (theme === 'aurora') { isDark = true; document.documentElement.classList.add('dark'); document.getElementById('dark-icon').textContent = '☀️'; document.body.classList.add('theme-aurora'); }
      else if (theme === 'colorful') { document.body.classList.add('theme-colorful'); }
      document.querySelectorAll('.theme-btn').forEach(btn => {
        if (btn.dataset.theme === theme) { btn.classList.add('bg-white', 'dark:bg-gray-700', 'shadow-sm', 'text-gray-900', 'dark:text-gray-100'); btn.classList.remove('text-gray-500', 'dark:text-gray-400'); }

              <button onclick="addTask('${list.id}')" class="quick-add-btn px-4 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white text-sm font-medium rounded-xl hover:shadow-lg hover:shadow-orange-500/25 active:scale-95 transition-all duration-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
              </button>
            </div>
          </div>
        `;
        container.appendChild(panel);

        // List D&D event listeners
        panel.addEventListener('dragover', (e) => {
          if (!draggedList || draggedList === list.id) return;
          e.preventDefault(); panel.classList.add('list-drag-over');
        });
        panel.addEventListener('dragleave', () => panel.classList.remove('list-drag-over'));
        panel.addEventListener('drop', (e) => {
          e.preventDefault(); panel.classList.remove('list-drag-over');
          if (!draggedList || draggedList === list.id) return;
          const fromIdx = listsData.findIndex(l => l.id === draggedList);
          const toIdx = listsData.findIndex(l => l.id === list.id);
          if (fromIdx > -1 && toIdx > -1) {
            const [moved] = listsData.splice(fromIdx, 1);
            listsData.splice(toIdx, 0, moved);
          }
          draggedList = null; render();
        });

        // Add resize handle between lists
        if (listIndex < visibleLists.length - 1) {
          const handle = document.createElement('div');
          handle.className = 'col-resize-handle';
          handle.dataset.leftList = list.id;
          handle.dataset.rightList = visibleLists[listIndex + 1].id;
          handle.addEventListener('mousedown', startResize);
          container.appendChild(handle);
        }
        // Add resize handle for the rightmost list too
        if (listIndex === visibleLists.length - 1) {
          const handle = document.createElement('div');
          handle.className = 'col-resize-handle';
          handle.dataset.leftList = list.id;
          handle.dataset.rightList = '';
          handle.addEventListener('mousedown', startResizeSingle);
          container.appendChild(handle);
        }
      });

      // Restore scroll positions
      container.scrollLeft = savedScrollLeft;
      Object.entries(savedTaskScrolls).forEach(([id, top]) => { const el = document.getElementById(id); if (el) el.scrollTop = top; });

      renderPinboard();
      if (sidebarOpen) renderSidebarLists();
    }

      // Progress bar segments
      const prog = task.progress || 0;
      const progressHtml = `<div class="progress-bar" title="${progressLabels[prog]}" onclick="event.stopPropagation(); cycleProgress('${task.id}', '${listId}')">

                ${tf ? `<span class="badge-timeframe badge-clickable text-[10px] font-medium px-2 py-0.5 rounded-full border whitespace-nowrap ${tf.class}" onclick="event.stopPropagation(); showTimeframePicker(event, '${task.id}', '${listId}')">${tf.label}</span>` : ''}

    // =============================================
    // COLUMN RESIZE
    // =============================================
    function startResize(e) {
      e.preventDefault();
      const handle = e.target.closest('.col-resize-handle');
      const leftId = handle.dataset.leftList;
      const rightId = handle.dataset.rightList;
      const leftPanel = handle.previousElementSibling;
      const rightPanel = handle.nextElementSibling;
      if (!leftPanel || !rightPanel) return;

      handle.classList.add('dragging');
      const startX = e.clientX;
      const startLeftW = leftPanel.offsetWidth;
      const startRightW = rightPanel.offsetWidth;

      function onMove(e) {
        const dx = e.clientX - startX;
        const newLeft = Math.max(280, Math.min(600, startLeftW + dx));
        const newRight = Math.max(280, Math.min(600, startRightW - dx));
        leftPanel.style.width = newLeft + 'px';
        rightPanel.style.width = newRight + 'px';
        listWidths[leftId] = newLeft;
        listWidths[rightId] = newRight;
      }
      function onUp() {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // =============================================
    // SINGLE RESIZE (rightmost list)
    // =============================================
    function startResizeSingle(e) {
      e.preventDefault();
      const handle = e.target.closest('.col-resize-handle');
      const leftId = handle.dataset.leftList;
      const leftPanel = handle.previousElementSibling;
      if (!leftPanel) return;

      handle.classList.add('dragging');
      const startX = e.clientX;
      const startLeftW = leftPanel.offsetWidth;

      function onMove(e) {
        const dx = e.clientX - startX;
        const newLeft = Math.max(280, Math.min(600, startLeftW + dx));
        leftPanel.style.width = newLeft + 'px';
        listWidths[leftId] = newLeft;
      }
      function onUp() {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // =============================================
    // FOCUS CLICK HANDLER
    // =============================================
    function handleTaskCardClick(e, taskId, listId) {
      // Only trigger focus from the card frame/padding, not from inner content
      // Inner elements (task-content, checkbox, badges, more-btn) all stopPropagation
      if (focusClickTimer) return;
      focusClickTimer = setTimeout(() => { focusClickTimer = null; enterFocusMode(taskId, listId); }, 280);
    }

    // =============================================
    // PINBOARD DRAG & DROP
    // =============================================
    function initPinboardDnD() {
      const pinboard = document.getElementById('pinboard');
      pinboard.addEventListener('dragover', (e) => {
        if (draggedPinCard || (draggedItem && draggedItem.type === 'task')) {
          e.preventDefault();
          pinboard.classList.add('pin-drag-over');
        }
      });
      pinboard.addEventListener('dragleave', () => pinboard.classList.remove('pin-drag-over'));
      pinboard.addEventListener('drop', (e) => {
        e.preventDefault();
        pinboard.classList.remove('pin-drag-over');
        // Pin card dropped back on pinboard → keep pinned
        if (draggedPinCard) { draggedPinCard = null; return; }
        // Task from list dropped on pinboard → pin it
        if (!draggedItem || draggedItem.type !== 'task') return;
        const list = findList(draggedItem.listId);
        const task = findTaskRecursive(list.tasks, draggedItem.id);
        if (task) { task.pinned = true; draggedItem = null; render(); }
      });
    }

    // =============================================
    // PROGRESS
    // =============================================
    function cycleProgress(taskId, listId) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (!task) return;
      task._prevProgress = task.progress || 0;
      task.progress = (task._prevProgress + 1) % 4;
      if (task.progress === 3) {
        task.done = true;
        if (task.subtasks) task.subtasks.forEach(s => { s.done = true; });
        const el = document.getElementById('task-' + taskId);
        if (el) { el.classList.add('task-exit'); setTimeout(() => render(), 300); return; }
      }
      render();
    }

    function setProgress(taskId, listId, level) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (!task) return;
      task._prevProgress = task.progress || 0;
      task.progress = level;
      if (level === 3) {
        task.done = true;
        if (task.subtasks) task.subtasks.forEach(s => { s.done = true; });
      }
      hideContextMenu();
      render();
    }

    // TOGGLE ALL SUBTASKS
    // =============================================
    function toggleAllSubtasks(listId) {
      allSubtasksCollapsed[listId] = !allSubtasksCollapsed[listId];
      render();
    }

          <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>

        ${otherLists.length > 0 ? `

            ${otherLists.map(l => `<div class="context-menu-item" onclick="moveTaskToList('${taskId}', '${listId}', '${l.id}')">${l.icon} ${l.title}</div>`).join('')}

        <div class="context-menu-item" onclick="deleteTask('${task.id}', '${listId}'); hideContextMenu()">

      menu.classList.remove('hidden');
      const rect = menu.getBoundingClientRect();
      let x = e.clientX, y = e.clientY;
      if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 8;
      if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 8;

    function hideContextMenu() { document.getElementById('context-menu').classList.add('hidden'); activeContextMenu = null; }
    function showSubmenu(parent, type) { const sub = parent.querySelector('[data-submenu="' + type + '"]'); if (sub) sub.classList.remove('hidden'); }
    function hideSubmenu(parent) { parent.querySelectorAll('.context-submenu').forEach(s => s.classList.add('hidden')); }

    // Context Menu Actions
    function setPriority(taskId, listId, priority) { const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (task) { task.priority = priority; hideContextMenu(); render(); } }
    function setTimeframe(taskId, listId, timeframe) { const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (task) { task.timeframe = timeframe; hideContextMenu(); render(); } }
    function setAssignee(taskId, listId, userName) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (task) { task.assignee = userName ? dummyUsers.find(u => u.name === userName) : null; hideContextMenu(); render(); }
    }
    function promptDueDate(taskId, listId) {
      hideContextMenu();
      const date = prompt('Datum eingeben (YYYY-MM-DD):');
      if (date && /^\d{4}-\d{2}-\d{2}$/.test(date)) { const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (task) { task.dueDate = date; render(); } }
    }
    function addTaskAfter(taskId, listId) {
      hideContextMenu();
      const list = findList(listId);
      const idx = list.tasks.findIndex(t => t.id === taskId);
      const text = prompt('Neue Aufgabe:');
      if (text && text.trim()) { list.tasks.splice(idx + 1, 0, { id: 'task-' + Date.now(), text: text.trim(), priority: 'normal', timeframe: null, highlighted: false, done: false, pinned: false, note: null, emoji: null, dueDate: null, assignee: null, progress: 0, subtasks: [] }); render(); }
    }
    function addSubtaskTo(taskId, listId) {
      hideContextMenu();
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      const text = prompt('Neue Unteraufgabe:');
      if (text && text.trim() && task) { if (!task.subtasks) task.subtasks = []; task.subtasks.push({ id: 'st-' + Date.now(), text: text.trim(), done: false, subtasks: [] }); render(); }
    }
    function addDividerAfter(taskId, listId) {
      hideContextMenu();
      const list = findList(listId);
      const idx = list.tasks.findIndex(t => t.id === taskId);
      const label = prompt('Trenner-Text:', 'Abschnitt');
      if (label) { list.tasks.splice(idx + 1, 0, { id: 'div-' + Date.now(), type: 'divider', label: label }); render(); }
    }
    function moveTaskToList(taskId, fromListId, toListId) {
      hideContextMenu();
      const fromList = findList(fromListId), toList = findList(toListId);
      const idx = fromList.tasks.findIndex(t => t.id === taskId);
      if (idx > -1) { const [task] = fromList.tasks.splice(idx, 1); toList.tasks.push(task); render(); }
    }

    // =============================================

    function openEmojiPickerForList(listId, e) {
      e.stopPropagation(); hideAllPopups();

      picker.innerHTML = commonEmojis.map(em => `<button onclick="setListEmoji('${listId}', '${em}')">${em}</button>`).join('');

      const rect = e.target.getBoundingClientRect();
      picker.style.left = rect.left + 'px'; picker.style.top = (rect.bottom + 4) + 'px';
      activeEmojiPicker = picker;
    }
    function openEmojiPickerForTask(taskId, listId, e) {
      e.stopPropagation(); hideContextMenu();
      const picker = document.getElementById('emoji-picker');
      picker.innerHTML = `<button onclick="setTaskEmoji('${taskId}', '${listId}', null)" style="font-size:12px;color:#999">✕</button>` +
        commonEmojis.map(em => `<button onclick="setTaskEmoji('${taskId}', '${listId}', '${em}')">${em}</button>`).join('');
      picker.classList.remove('hidden');
      picker.style.left = (e.clientX || e.pageX) + 'px'; picker.style.top = (e.clientY || e.pageY) + 'px';
      activeEmojiPicker = picker;
    }
    function setListEmoji(listId, emoji) { const list = findList(listId); if (list) { list.icon = emoji; hideEmojiPicker(); render(); } }
    function setTaskEmoji(taskId, listId, emoji) { const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (task) { task.emoji = emoji; hideEmojiPicker(); render(); } }
    function hideEmojiPicker() { document.getElementById('emoji-picker').classList.add('hidden'); activeEmojiPicker = null; }

    // =============================================
    // INLINE EDIT
    // =============================================
    function startEditListTitle(listId, el) {
      const list = findList(listId); if (!list) return;
      const input = document.createElement('input');
      input.type = 'text'; input.value = list.title;
      input.className = 'inline-edit-title text-lg font-semibold text-gray-800 dark:text-gray-100 tracking-tight';
      input.onblur = () => { list.title = input.value.trim() || list.title; render(); };
      input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = list.title; input.blur(); } };
      el.replaceWith(input); input.focus(); input.select();
    }

    function startEditTaskText(taskId, listId, el) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (!task) return;
      const input = document.createElement('input');
      input.type = 'text'; input.value = task.text;
      input.className = 'inline-edit-task text-sm font-medium text-gray-800 dark:text-gray-100';
      input.style.minWidth = '80px';
      input.onblur = () => { task.text = input.value.trim() || task.text; render(); };
      input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = task.text; input.blur(); } };
      el.replaceWith(input); input.focus(); input.select();
    }

    function startEditSubtaskText(subtaskId, listId, el) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, subtaskId);
      if (!task) return;
      const input = document.createElement('input');
      input.type = 'text'; input.value = task.text;
      input.className = 'inline-edit-task text-xs text-gray-600 dark:text-gray-400';
      input.onblur = () => { task.text = input.value.trim() || task.text; render(); };
      input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = task.text; input.blur(); } };
      el.replaceWith(input); input.focus(); input.select();
    }

    // =============================================
    // NOTE POPOVER
    // =============================================
    function showNote(e, taskId, listId) {
      e.stopPropagation(); hideAllPopups();
      const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (!task) return;
      const popover = document.getElementById('note-popover');
      popover.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Notiz</span>
          <button onclick="hideNotePopover()" class="w-5 h-5 flex items-center justify-center rounded hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <textarea class="w-full text-sm text-gray-700 dark:text-gray-300 bg-transparent resize-none outline-none min-h-[60px]" placeholder="Notiz eingeben..." id="note-textarea-${taskId}" oninput="updateNote('${taskId}', '${listId}', this.value)">${task.note || ''}</textarea>
      `;
      popover.classList.remove('hidden');
      const rect = e.target.closest('button').getBoundingClientRect();
      let left = rect.left - 100, top = rect.bottom + 8;
      if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
      if (left < 8) left = 8;
      if (top + 120 > window.innerHeight) top = rect.top - 128;
      popover.style.left = left + 'px'; popover.style.top = top + 'px';
      activeNotePopover = popover;
      setTimeout(() => document.getElementById('note-textarea-' + taskId)?.focus(), 50);
    }
    function updateNote(taskId, listId, value) { const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (task) task.note = value.trim() || null; }
    function hideNotePopover() { document.getElementById('note-popover').classList.add('hidden'); activeNotePopover = null; render(); }
    function hideAllPopups() { hideContextMenu(); hideEmojiPicker(); if (activeNotePopover) hideNotePopover(); }

    // =============================================
    // HELPERS
    // =============================================
    function formatDate(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
    function findTaskRecursive(tasks, id) {
      for (const t of tasks) { if (t.id === id) return t; if (t.subtasks) { const found = findTaskRecursive(t.subtasks, id); if (found) return found; } }
      return null;
    }
    function findList(listId) { return listsData.find(l => l.id === listId); }
    function findParentOfSubtask(tasks, subtaskId) {
      for (const t of tasks) {
        if (t.subtasks) {
          for (const st of t.subtasks) { if (st.id === subtaskId) return t; }
          const found = findParentOfSubtask(t.subtasks, subtaskId);
          if (found) return found;
        }
      }
      return null;
    }

    // =============================================
    // TASK ACTIONS
    // =============================================
    function toggleTask(taskId, listId) {
      const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId); if (!task) return;
      task.done = !task.done;
      if (task.done) { task._prevProgress = task.progress; task.progress = 3; }
      function setAllDone(t, done) { t.done = done; if (t.subtasks) t.subtasks.forEach(s => setAllDone(s, done)); }
      if (task.subtasks) task.subtasks.forEach(s => setAllDone(s, task.done));
      const el = document.getElementById('task-' + taskId);
      if (el && task.done) { el.classList.add('task-exit'); setTimeout(() => render(), 300); }
      else render();
    }
    function toggleSubtask(subtaskId, listId) {
      const list = findList(listId); const task = findTaskRecursive(list.tasks, subtaskId);
      if (task) { task.done = !task.done; function setAllDone(t, done) { t.done = done; if (t.subtasks) t.subtasks.forEach(s => setAllDone(s, done)); } if (task.subtasks) task.subtasks.forEach(s => setAllDone(s, task.done)); render(); }
    }
    function undoTask(taskId, listId) {
      const list = findList(listId); const task = findTaskRecursive(list.tasks, taskId);
      if (task) { task.done = false; task.progress = (task._prevProgress !== undefined) ? task._prevProgress : 0; delete task._prevProgress; if (task.subtasks) task.subtasks.forEach(s => { s.done = false; }); render(); }
    }
    function toggleHighlight(taskId, listId) {
      const list = findList(listId); const task = list.tasks.find(t => t.id === taskId); if (!task) return;
      task.highlighted = !task.highlighted; render();
      setTimeout(() => { const el = document.getElementById('task-' + taskId); if (el && task.highlighted) { el.classList.add('task-highlight-in'); setTimeout(() => el.classList.remove('task-highlight-in'), 500); } }, 50);
    }
    function deleteTask(taskId, listId) {
      const list = findList(listId); const el = document.getElementById('task-' + taskId);
      if (el) { el.classList.add('task-exit'); setTimeout(() => { list.tasks = list.tasks.filter(t => t.id !== taskId); render(); }, 300); }
      else { list.tasks = list.tasks.filter(t => t.id !== taskId); render(); }
    }
    function addTask(listId) {
      const input = document.getElementById('input-' + listId); const text = input.value.trim(); if (!text) return;
      const list = findList(listId);
      const newTask = { id: 'task-' + Date.now(), text, priority: 'normal', timeframe: null, highlighted: false, done: false, pinned: false, note: null, emoji: null, dueDate: null, assignee: null, progress: 0, subtasks: [] };
      list.tasks.push(newTask); input.value = ''; render();
      setTimeout(() => { const el = document.getElementById('task-' + newTask.id); if (el) { el.classList.add('task-enter'); setTimeout(() => el.classList.remove('task-enter'), 350); } }, 20);
    }
    function toggleSubtasks(taskId) {
      const el = document.getElementById('subtasks-' + taskId); const chevron = document.getElementById('subtask-chevron-' + taskId);
      if (!el) return;
      if (el.style.display === 'none') { el.style.display = ''; chevron.style.transform = 'rotate(90deg)'; }
      else { el.style.display = 'none'; chevron.style.transform = 'rotate(0deg)'; }
    }
    function toggleDoneSection(listId) {
      const el = document.getElementById('done-section-' + listId); const chevron = document.getElementById('done-chevron-' + listId);
      if (!el) return;
      if (el.classList.contains('hidden')) { el.classList.remove('hidden'); el.classList.add('fade-in'); chevron.style.transform = 'rotate(90deg)'; }
      else { el.classList.add('hidden'); el.classList.remove('fade-in'); chevron.style.transform = 'rotate(0deg)'; }
    }

    // =============================================
    // DRAG & DROP
    // =============================================
    function onDragStart(e, taskId, listId) {
      draggedItem = { id: taskId, listId, type: 'task' };
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onSubtaskDragStart(e, subtaskId, listId) {
      draggedItem = { id: subtaskId, listId, type: 'subtask' };
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragOver(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      const item = e.target.closest('.task-item') || e.target.closest('.subtask-item');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (item) item.classList.add('drag-over');
    }
    function onDrop(e, targetId, targetListId) {
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (!draggedItem || draggedItem.id === targetId) return;

      if (draggedItem.type === 'task') {
        const sourceList = findList(draggedItem.listId), targetList = findList(targetListId);
        const sourceIdx = sourceList.tasks.findIndex(t => t.id === draggedItem.id);
        const targetIdx = targetList.tasks.findIndex(t => t.id === targetId);
        if (sourceIdx === -1 || targetIdx === -1) { draggedItem = null; return; }
        const [task] = sourceList.tasks.splice(sourceIdx, 1);
        targetList.tasks.splice(targetIdx, 0, task);
      } else if (draggedItem.type === 'subtask') {
        // Subtask dropped on a task -> move to that task's subtasks
        const sourceList = findList(draggedItem.listId);
        const sourceParent = findParentOfSubtask(sourceList.tasks, draggedItem.id);
        if (!sourceParent) { draggedItem = null; return; }
        const sourceIdx = sourceParent.subtasks.findIndex(s => s.id === draggedItem.id);
        if (sourceIdx === -1) { draggedItem = null; return; }
        const [subtask] = sourceParent.subtasks.splice(sourceIdx, 1);
        const targetList = findList(targetListId);
        const targetTask = targetList.tasks.find(t => t.id === targetId);
        if (targetTask) {
          if (!targetTask.subtasks) targetTask.subtasks = [];
          targetTask.subtasks.push(subtask);
        }
      }
      draggedItem = null; render();
    }
    function onSubtaskDrop(e, targetSubtaskId, targetListId) {
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (!draggedItem || draggedItem.type !== 'subtask' || draggedItem.id === targetSubtaskId) return;

      const sourceList = findList(draggedItem.listId);
      const targetList = findList(targetListId);
      const sourceParent = findParentOfSubtask(sourceList.tasks, draggedItem.id);
      if (!sourceParent) { draggedItem = null; return; }
      const sourceIdx = sourceParent.subtasks.findIndex(s => s.id === draggedItem.id);
      if (sourceIdx === -1) { draggedItem = null; return; }
      const [subtask] = sourceParent.subtasks.splice(sourceIdx, 1);

      const targetParent = findParentOfSubtask(targetList.tasks, targetSubtaskId);
      if (targetParent) {
        const targetIdx = targetParent.subtasks.findIndex(s => s.id === targetSubtaskId);
        targetParent.subtasks.splice(targetIdx, 0, subtask);
      }
      draggedItem = null; render();
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      draggedItem = null;
    }

    // =============================================
    // FOCUS MODE
    // =============================================
    function enterFocusMode(taskId, listId) {
      const list = findList(listId);
      const task = findTaskRecursive(list.tasks, taskId);
      if (!task) return;
      focusedTask = { taskId, listId };
      const p = priorityConfig[task.priority] || priorityConfig.normal;
      const tf = task.timeframe ? timeframeConfig[task.timeframe] : null;
      const prog = task.progress || 0;
      const hasSubtasks = task.subtasks && task.subtasks.length > 0;
      const doneSubtasks = hasSubtasks ? task.subtasks.filter(s => s.done).length : 0;

      const overlay = document.getElementById('focus-overlay');
      overlay.innerHTML = `
        <div class="focus-card bg-white dark:bg-[#1e1e2e] rounded-2xl shadow-2xl border border-gray-200/60 dark:border-gray-700/60 p-6" onclick="event.stopPropagation()">
          <div class="flex items-start gap-3 mb-5">
            <div style="width:4px;min-height:40px;border-radius:2px;background:${p.bar};flex-shrink:0;"></div>
            <div class="flex-1 min-w-0">
              <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">${task.emoji ? task.emoji + ' ' : ''}${task.text}</h3>
              <div class="flex flex-wrap items-center gap-2">
                <span class="text-[11px] font-semibold px-2.5 py-1 rounded-lg" style="background:${p.bar}18;color:${p.bar}">${p.label}</span>
                ${tf ? `<span class="text-[11px] font-medium px-2.5 py-1 rounded-lg border ${tf.class}">${tf.label}</span>` : ''}
                ${task.dueDate ? `<span class="text-[11px] text-gray-500 dark:text-gray-400">📅 ${formatDate(task.dueDate)}</span>` : ''}
                <span class="text-[11px] font-medium" style="color:${progressColors[prog]}">${progressLabels[prog]}</span>
              </div>
            </div>
            <button onclick="exitFocusMode()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          ${task.note ? `
          <div class="mb-4 p-3.5 rounded-xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-800/20">
            <span class="text-[10px] font-semibold text-blue-500 dark:text-blue-400 uppercase tracking-wider block mb-1.5">Notiz</span>
            <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${task.note}</p>
          </div>` : ''}
          ${hasSubtasks ? `
          <div>
            <div class="flex items-center justify-between mb-2">
              <span class="text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Unteraufgaben</span>
              <span class="text-[11px] text-gray-400 dark:text-gray-500">${doneSubtasks}/${task.subtasks.length}</span>
            </div>
            <div class="space-y-1">${renderFocusSubtasks(task.subtasks, taskId, listId)}</div>
          </div>` : ''}
        </div>`;
      overlay.classList.remove('hidden');
    }
    function renderFocusSubtasks(subtasks, rootTaskId, listId) {
      return subtasks.map(st => `
        <div class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/30">
          <label class="custom-checkbox" style="width:16px;height:16px">
            <input type="checkbox" ${st.done ? 'checked' : ''} onchange="toggleSubtask('${st.id}', '${listId}'); setTimeout(() => enterFocusMode('${rootTaskId}', '${listId}'), 50)">
            <span class="checkmark" style="border-radius:4px;border-width:1.5px"></span>
          </label>
          <span class="text-sm text-gray-700 dark:text-gray-300 ${st.done ? 'line-through opacity-40' : ''}">${st.text}</span>
        </div>
        ${st.subtasks && st.subtasks.length > 0 ? '<div class="ml-5">' + renderFocusSubtasks(st.subtasks, rootTaskId, listId) + '</div>' : ''}
      `).join('');
    }
    function exitFocusMode() {
      document.getElementById('focus-overlay').classList.add('hidden');
      focusedTask = null;
    }

    // =============================================
    // LIST DRAG & DROP
    // =============================================
    // Pin card drag (for unpinning by dragging out)
    let draggedPinCard = null;
    function onPinCardDragStart(e, taskId, listId) {
      draggedPinCard = { taskId, listId };
      e.target.classList.add('pin-dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onPinCardDragEnd(e) {
      e.target.classList.remove('pin-dragging');
      // draggedPinCard is cleared on drop inside pinboard; if still set → dropped outside → unpin
      if (draggedPinCard) {
        const list = findList(draggedPinCard.listId);
        const task = findTaskRecursive(list.tasks, draggedPinCard.taskId);
        if (task) { task.pinned = false; render(); }
        draggedPinCard = null;
      }
    }

    function onListDragStart(e, listId) {
      e.stopPropagation();
      draggedList = listId;
      const panel = e.target.closest('.list-panel');
      if (panel) panel.classList.add('list-dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onListDragEnd(e) {
      document.querySelectorAll('.list-dragging, .list-drag-over').forEach(el => el.classList.remove('list-dragging', 'list-drag-over'));
      draggedList = null;
    }

    // =============================================
    // INLINE BADGE PICKERS
    // =============================================
    function showPriorityPicker(e, taskId, listId) {
      hideAllPopups();
      const menu = document.getElementById('context-menu');
      menu.innerHTML = `
        <div class="context-menu-item" onclick="setPriority('${taskId}', '${listId}', 'low')"><span class="w-2 h-2 rounded-full bg-gray-400 inline-block"></span> Niedrig</div>
        <div class="context-menu-item" onclick="setPriority('${taskId}', '${listId}', 'normal')"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span> Normal</div>
        <div class="context-menu-item" onclick="setPriority('${taskId}', '${listId}', 'high')"><span class="w-2 h-2 rounded-full bg-orange-500 inline-block"></span> Hoch</div>
        <div class="context-menu-item" onclick="setPriority('${taskId}', '${listId}', 'asap')"><span class="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block"></span> ASAP!</div>
      `;
      menu.classList.remove('hidden');
      let x = e.clientX, y = e.clientY;
      menu.style.left = x + 'px'; menu.style.top = y + 'px';
      setTimeout(() => {
        const rect = menu.getBoundingClientRect();
        if (x + rect.width > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
        if (y + rect.height > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
      }, 0);
      activeContextMenu = menu;
    }
    function showTimeframePicker(e, taskId, listId) {
      hideAllPopups();
      const menu = document.getElementById('context-menu');
      menu.innerHTML = `
        <div class="context-menu-item" onclick="setTimeframe('${taskId}', '${listId}', 'akut')"><span class="text-red-500">●</span> Akut</div>
        <div class="context-menu-item" onclick="setTimeframe('${taskId}', '${listId}', 'zeitnah')"><span class="text-orange-500">●</span> Zeitnah</div>
        <div class="context-menu-item" onclick="setTimeframe('${taskId}', '${listId}', 'mittelfristig')"><span class="text-amber-500">●</span> Mittelfristig</div>
        <div class="context-menu-item" onclick="setTimeframe('${taskId}', '${listId}', 'langfristig')"><span class="text-green-500">●</span> Langfristig</div>
      `;
      menu.classList.remove('hidden');
      let x = e.clientX, y = e.clientY;
      menu.style.left = x + 'px'; menu.style.top = y + 'px';
      setTimeout(() => {
        const rect = menu.getBoundingClientRect();
        if (x + rect.width > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
        if (y + rect.height > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
      }, 0);
      activeContextMenu = menu;
    }

    // =============================================
    // GLOBAL LISTENERS
    // =============================================
    document.addEventListener('click', (e) => {
      if (activeContextMenu && !e.target.closest('.context-menu')) hideContextMenu();
      if (activeEmojiPicker && !e.target.closest('.emoji-picker')) hideEmojiPicker();
    });
    let longPressTimer = null;
    document.addEventListener('touchstart', (e) => {
      const taskItem = e.target.closest('.task-item');
      if (taskItem) {
        const taskId = taskItem.id.replace('task-', '');
        longPressTimer = setTimeout(() => {
          for (const list of listsData) { const task = findTaskRecursive(list.tasks, taskId); if (task && task.note) { const fakeEvent = { stopPropagation: () => {}, target: taskItem, clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }; showNote(fakeEvent, taskId, list.id); break; } }
        }, 600);
      }
    });
    document.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
    document.addEventListener('touchmove', () => { clearTimeout(longPressTimer); });

    // =============================================
    // INIT
    // =============================================
    // Default: alle Unteraufgaben eingeklappt
    listsData.forEach(l => { allSubtasksCollapsed[l.id] = true; });
    render();
    initPinboardDnD();
  </script>
</body>
</html>
